name: Deploy RAG Demo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "rag/**"
      - ".github/workflows/deploy-rag.yml"

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx biome check .
      - run: bunx tsc --noEmit

  deploy-api:
    name: Deploy API Worker
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx wrangler d1 execute rag-demo --remote --file=apps/api/schema.sql
      - run: bunx wrangler deploy
        working-directory: rag/apps/api

  deploy-web:
    name: Deploy Frontend
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx vite build
        working-directory: rag/apps/web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          BASE_PATH: /docrag/
      - run: mkdir -p dist/docrag && cp -r apps/web/dist/* dist/docrag/
      - run: bunx wrangler pages deploy dist --project-name=superdoc-demos --commit-dirty=true
