name = "docrag-api"
main = "src/worker.ts"
compatibility_date = "2026-03-26"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "rag-demo-docs"
remote = true

[vars]
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put`):
# DATABASE_URL (Neon connection string)
# OPENAI_API_KEY
# ANTHROPIC_API_KEY
# INGEST_SERVICE_URL (e.g. https://ingest.yourdomain.com)
# AUTH_TOKEN (shared secret between Worker and ingest service)
