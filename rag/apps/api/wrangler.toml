name = "rag-demo-api"
main = "src/worker.ts"
compatibility_date = "2026-03-26"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "rag-demo-docs"

[[vectorize]]
binding = "VECTORIZE"
index_name = "rag-chunks"
remote = true

[[d1_databases]]
binding = "DB"
database_name = "rag-demo"
database_id = "" # Run `wrangler d1 create rag-demo` and paste the ID here

[vars]
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put`):
# OPENAI_API_KEY
# ANTHROPIC_API_KEY
# INGEST_SERVICE_URL (e.g. https://ingest.yourdomain.com)
# AUTH_TOKEN (shared secret between Worker and ingest service)
